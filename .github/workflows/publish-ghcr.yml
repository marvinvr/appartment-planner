name: Publish GHCR Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push latest image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/marvinvr/appartment-planner:latest
          labels: |
            org.opencontainers.image.source=https://github.com/marvinvr/appartment-planner
            org.opencontainers.image.description=Self-hosted floor plan layout planner built with Next.js and SQLite.
          cache-from: type=gha
          cache-to: type=gha,mode=max
